name: Weekly Intel Brief

on:
  schedule:
    # Weekly Monday 12:00 UTC = 5:00 AM Pacific (during PDT), 4:00 AM (PST).
    # Brief lands in Slack by 8 AM PT either way.
    - cron: '0 12 * * 1'
  workflow_dispatch:    # allow manual runs from the Actions tab

permissions:
  contents: write       # required to commit the weekly brief back to the repo

concurrency:
  group: daily-intel
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # was 20; ledger pipeline is ~5min slower

    env:
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      MAX_DAILY_COST_USD: "3.00"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set DATE env
        run: |
          echo "DATE=$(date -u +%F)" >> "$GITHUB_ENV"

      - name: Find most recent prior ledger
        # Look back up to 35 days for the most recent ledger.json. We can't
        # assume last week's run exists — runs can be skipped, repos can be branched.
        id: find_ledger
        run: |
          PRIOR_LEDGER=""
          for i in $(seq 1 35); do
            CHECK_DATE=$(date -u -d "${i} days ago" +%F 2>/dev/null || date -u -v-${i}d +%F)
            CANDIDATE="intel/${CHECK_DATE}/ledger.json"
            if [ -f "$CANDIDATE" ]; then
              PRIOR_LEDGER="$CANDIDATE"
              echo "Found prior ledger: $PRIOR_LEDGER"
              break
            fi
          done
          if [ -z "$PRIOR_LEDGER" ]; then
            echo "No prior ledger found in the last 35 days; synthesis will run without dedup"
          fi
          echo "PRIOR_LEDGER=$PRIOR_LEDGER" >> "$GITHUB_ENV"

      - name: Collect raw signal
        run: python intel/pipeline.py collect --out-dir intel/${DATE}

      - name: Stage 1 — triage
        run: |
          python intel/pipeline.py triage \
            --in-file  intel/${DATE}/raw.jsonl \
            --out-file intel/${DATE}/triaged.jsonl

      - name: Stage 2 — synthesize (with ledger dedup)
        run: |
          if [ -n "${PRIOR_LEDGER}" ]; then
            python intel/pipeline.py synthesize \
              --in-file      intel/${DATE}/triaged.jsonl \
              --out-file     intel/${DATE}/brief.md \
              --prior-ledger "${PRIOR_LEDGER}"
          else
            python intel/pipeline.py synthesize \
              --in-file  intel/${DATE}/triaged.jsonl \
              --out-file intel/${DATE}/brief.md
          fi

      - name: Update topic ledger
        run: |
          if [ -n "${PRIOR_LEDGER}" ]; then
            python intel/update_ledger.py \
              --brief-file    intel/${DATE}/brief.md \
              --prior-ledger  "${PRIOR_LEDGER}" \
              --ledger-out    intel/${DATE}/ledger.json
          else
            python intel/update_ledger.py \
              --brief-file  intel/${DATE}/brief.md \
              --ledger-out  intel/${DATE}/ledger.json
          fi

      - name: Publish to Slack
        continue-on-error: true
        run: python intel/pipeline.py publish --brief-file intel/${DATE}/brief.md

      - name: Commit run artifacts
        run: |
          git config user.name  "asa-intel-bot"
          git config user.email "asa-intel-bot@users.noreply.github.com"
          git add intel/${DATE}/
          if git diff --cached --quiet; then
            echo "Nothing to commit (quiet day)."
          else
            git commit -m "intel: brief ${DATE}"
            git push
          fi

      - name: Upload artifacts (always, even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intel-${{ env.DATE }}
          path: intel/${{ env.DATE }}/
          retention-days: 30
