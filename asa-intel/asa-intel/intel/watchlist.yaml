  - name: Finovate
    rss: "https://finovate.com/feed/"
  - name: Bank Automation News
    rss: "https://bankautomationnews.com/feed/"
  - name: Banking Dive
    rss: "https://www.bankingdive.com/feeds/news/"          # verify
  - name: PYMNTS
    rss: "https://www.pymnts.com/feed/"
  - name: Finextra
