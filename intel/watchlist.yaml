# ASA Daily Intel — Watchlist
#
# Single source of truth for what the pipeline tracks. Edit this file (PR, review,
# merge) when entities change. The pipeline reads it on every run.
#
# Each entry must have: name, why_we_care (one line). Optional: blog_rss,
# pressroom_rss, careers_url, ticker, sec_cik, github_org, twitter_handle.
#
# Feed strategy: where companies publish reliable first-party RSS we use it.
# Where they don't (or where their RSS keeps breaking), we route through
# Google News RSS — same URL pattern for every query, catches third-party
# coverage too. The triage step drops irrelevant matches automatically.

version: "0.2"
last_reviewed: "2026-05-01"

buckets:
  # Direct & adjacent platforms — whose moves directly affect ASA's win rate
  # or product roadmap.
  direct_adjacent:
    - name: Plaid
      why_we_care: "Largest data-aggregation network; pivoting to 'intelligent finance' positioning that overlaps ASA Vault."
      blog_rss: "https://plaid.com/blog/rss.xml"
      careers_url: "https://plaid.com/careers/"

    - name: MX
      why_we_care: "Direct positioning overlap; aggressive agentic-AI moves via Primitive partnership."
      blog_rss: "https://news.google.com/rss/search?q=%22MX+Technologies%22+OR+%22mx.com%22+fintech&hl=en-US&gl=US&ceid=US:en"
      careers_url: "https://www.mx.com/careers/"

    - name: Mastercard Open Banking (Finicity)
      why_we_care: "Aggregator with Mastercard distribution muscle and bank channel relationships."
      blog_rss: "https://news.google.com/rss/search?q=%22Finicity%22+OR+%22Mastercard+Open+Banking%22&hl=en-US&gl=US&ceid=US:en"

    - name: Envestnet | Yodlee
      why_we_care: "Long-tail aggregator with deep wealth-management hooks."
      blog_rss: "https://news.google.com/rss/search?q=%22Envestnet+Yodlee%22+OR+%22Yodlee%22+aggregator&hl=en-US&gl=US&ceid=US:en"

    - name: Akoya
      why_we_care: "Bank-owned aggregation network; relevant for 1033 fee dynamics."
      blog_rss: "https://news.google.com/rss/search?q=%22Akoya%22+open+banking+aggregator&hl=en-US&gl=US&ceid=US:en"

    - name: Atomic Financial
      why_we_care: "Payroll/income-data adjacency; potential ASA Verify overlap."
      blog_rss: "https://news.google.com/rss/search?q=%22Atomic+Financial%22+payroll+OR+income&hl=en-US&gl=US&ceid=US:en"

    - name: Pinwheel
      why_we_care: "Payroll API; direct deposit switching is a contested space."
      blog_rss: "https://news.google.com/rss/search?q=%22Pinwheel%22+payroll+API&hl=en-US&gl=US&ceid=US:en"

    - name: Method Financial
      why_we_care: "Liability-side data network; ASA Compass-adjacent insights."
      blog_rss: "https://news.google.com/rss/search?q=%22Method+Financial%22+fintech&hl=en-US&gl=US&ceid=US:en"

    - name: Personetics
      why_we_care: "Direct competitor in 'cognitive banking' / financial intelligence space; shipped MCP server."
      blog_rss: "https://news.google.com/rss/search?q=%22Personetics%22&hl=en-US&gl=US&ceid=US:en"

    - name: Flybits
      why_we_care: "Contextual intelligence for FIs; adjacent positioning."
      blog_rss: "https://news.google.com/rss/search?q=%22Flybits%22+banking&hl=en-US&gl=US&ceid=US:en"

    - name: Bud Financial
      why_we_care: "Transaction enrichment; now native in Banno — direct One View competitor."
      blog_rss: "https://news.google.com/rss/search?q=%22Bud+Financial%22+OR+%22thisisbud%22&hl=en-US&gl=US&ceid=US:en"

    - name: Monarch Money
      why_we_care: "Consumer PFM; signals end-user expectation drift."
      blog_rss: "https://news.google.com/rss/search?q=%22Monarch+Money%22&hl=en-US&gl=US&ceid=US:en"

    - name: Copilot Money
      why_we_care: "Consumer PFM; iOS-first design signals."
      blog_rss: "https://news.google.com/rss/search?q=%22Copilot+Money%22&hl=en-US&gl=US&ceid=US:en"

  # Channel partners & frenemies — moves here can expand or vaporize ASA's TAM.
  channel_partners:
    - name: Jack Henry
      why_we_care: "Banno digital banking platform = primary distribution channel; native Bud integration is a direct hit."
      ticker: "JKHY"
      sec_cik: "0000779152"
      blog_rss: "https://news.google.com/rss/search?q=%22Jack+Henry%22+OR+Banno+OR+JKHY&hl=en-US&gl=US&ceid=US:en"

    - name: Alkami
