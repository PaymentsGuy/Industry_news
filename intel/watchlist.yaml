  # Regulators & standards — anything that changes data rights, liability,
  # or interoperability.
  regulators_standards:
    - name: CFPB
      why_we_care: "Section 1033 rule status defines the regulatory environment for the entire category."
      newsroom_rss: "https://www.consumerfinance.gov/about-us/newsroom/feed/"

    - name: OCC
      why_we_care: "Bank-fintech partnership guidance; charter activity."
      newsroom_rss: "https://news.google.com/rss/search?q=%22OCC%22+OR+%22Office+of+the+Comptroller%22+bank+fintech&hl=en-US&gl=US&ceid=US:en"

    - name: FDIC
      why_we_care: "Deposit insurance and partnership guidance."
      newsroom_rss: "https://news.google.com/rss/search?q=%22FDIC%22+bank+fintech+partnership&hl=en-US&gl=US&ceid=US:en"

    - name: FinCEN
      why_we_care: "AML / BSA rules affect identity flows."
      newsroom_rss: "https://news.google.com/rss/search?q=%22FinCEN%22+AML+OR+BSA&hl=en-US&gl=US&ceid=US:en"

    - name: FDX (Financial Data Exchange)
      why_we_care: "API standards body; recognized standard-setter under 1033."
      blog_rss: "https://news.google.com/rss/search?q=%22Financial+Data+Exchange%22+OR+%22FDX%22+open+banking&hl=en-US&gl=US&ceid=US:en"

  # Technology & macro — things that bend the roadmap regardless of any
  # one competitor.
  tech_macro:
    - name: Section 1033 regulatory rewrite
      why_we_care: "Direct tracking of the rule rewrite; affects whole category economics."
      blog_rss: "https://news.google.com/rss/search?q=%22Section+1033%22+CFPB+open+banking&hl=en-US&gl=US&ceid=US:en"

    - name: Agentic AI in banking
      why_we_care: "Defining theme of 2026; MCP servers becoming table stakes for FIs."
      blog_rss: "https://news.google.com/rss/search?q=%22agentic+AI%22+banking+OR+%22financial+institution%22&hl=en-US&gl=US&ceid=US:en"

    - name: MCP for finance
      why_we_care: "Personetics, MX, Plaid all moving here; ASA needs an answer."
      blog_rss: "https://news.google.com/rss/search?q=%22MCP+server%22+bank+OR+financial+OR+fintech&hl=en-US&gl=US&ceid=US:en"

    - name: On-device inference / privacy-preserving compute
      why_we_care: "Aligns with ASA's privacy-first positioning."
      blog_rss: "https://news.google.com/rss/search?q=%22on-device+AI%22+OR+%22privacy-preserving%22+financial&hl=en-US&gl=US&ceid=US:en"

    - name: Fraud trends (deepfakes, social engineering)
      why_we_care: "ASA Verify roadmap; Plaid IDV claims set the bar."
      blog_rss: "https://news.google.com/rss/search?q=deepfake+OR+%22synthetic+identity%22+banking+fraud&hl=en-US&gl=US&ceid=US:en"

# Google Alerts feeds — set these up in your Google Alerts UI with delivery
# set to "RSS feed", then paste the URLs here. Pattern: one alert per
# competitor name, plus thematic alerts.
google_alerts:
